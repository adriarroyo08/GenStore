server {
    server_name api-genstore.automatito.win;

    location /api/ {
        proxy_pass http://localhost:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # CORS handled by Hono backend — no duplicate headers here
    }

    location / {
        return 404;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api-genstore.automatito.win/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api-genstore.automatito.win/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = api-genstore.automatito.win) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name api-genstore.automatito.win;
    return 404; # managed by Certbot


}